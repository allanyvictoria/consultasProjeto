<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bem-Estar - Consultas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏥 Clínica Bem-Estar</a>
        </div>
    </nav>

    <header class="hero-header text-center shadow-sm">
        <div class="container">
            <h1 class="display-5 fw-bold text-primary">Gestão de Consultas</h1>
            <p class="lead text-muted">Consultas agendadas no sistema.</p>
        </div>
    </header>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-primary">
                        <i class="bi bi-search">🔍</i>
                    </span>
                    <input type="text" id="inputBuscaConsulta" class="form-control border-start-0 ps-0" 
                           placeholder="Buscar por paciente, médico ou data da consulta...">
                    <button class="btn btn-success" type="button" onclick="abrirModalAgendamento()" title="Agendar Nova Consulta">
                        <span class="fs-5 fw-bold">+</span>
                    </button>
                </div>
            </div>
        </div>

    <div class="modal fade" id="modalAgendamento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Agendar Nova Consulta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formAgendamento">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Paciente:</label>
                        <select id="agendPaciente" class="form-select" required>
                            <option value="">-- Selecione um paciente --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Data da Consulta:</label>
                        <input type="date" id="agendDataConsulta" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hora da Consulta:</label>
                        <input type="time" id="agendHoraConsulta" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Médico Responsável:</label>
                        <select id="agendMedico" class="form-select" required>
                            <option value="">-- Selecione um médico --</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="salvarAgendamento()">Salvar Agendamento</button>
            </div>
        </div>
    </div>
</div>
<main class="container">
    <div id="listaConsultasCards" class="row g-3">
        </div>
</main>

<div class="modal fade" id="modalDetalhesConsulta" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Editar Dados da Consulta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Paciente:</label>
                    <input type="text" id="editNomePaciente" class="form-control">  
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Data da Consulta:</label>
                    <input type="date" id="editDataConsulta" class="form-control">  
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Hora da Consulta:</label>
                    <input type="time" id="editHoraConsulta" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Médico Responsável:</label>
                    <input type="text" id="editMedicoResponsavel" class="form-control">                </div>
            </div>
            <div class="modal-footer d-flex justify-content-between">
                <button type="button" id="btnExcluirConsulta" class="btn btn-danger">Excluir Consulta</button>
                <button type="button" id="btnAtualizarConsulta" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </div>
    </div>
</div>
<footer class="text-center mt-5 py-4">
    <p class="text-secondary small">&copy; 2026 Sistema Clínico - Gestão Eficiente</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/consulta.js') }}"></script>
</body>
</html>
