<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bem-Estar - Início</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏥 Clínica Bem-Estar</a>
        </div>
    </nav>

    <header class="hero-header text-center shadow-sm">
        <div class="container">
            <h1 class="display-5 fw-bold text-primary">Painel de Gestão</h1>
            <p class="lead text-muted">Seja bem-vinda ao sistema administrativo da clínica.</p>
        </div>
    </header>

    <main class="container">
        <div class="row g-4 justify-content-center">

            <div class="col-md-4">
                <div class="card h-100 card-menu text-center p-4 shadow-sm" id="btn-pacientes">
                    <div class="card-icon">👤</div>
                    <h3 class="mt-3">Pacientes</h3>
                    <p class="text-muted">Gerenciar pacientes.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 card-menu text-center p-4 shadow-sm" id="btn-medicos">
                    <div class="card-icon">🩺</div>
                    <h3 class="mt-3">Médicos</h3>
                    <p class="text-muted">Especialidades e corpo clínico.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 card-menu text-center p-4 shadow-sm" id="btn-consultas">
                    <div class="card-icon">📅</div>
                    <h3 class="mt-3">Consultas</h3>
                    <p class="text-muted">Agenda e horários de atendimento.</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center mt-5 py-4">
        <p class="text-secondary small">&copy; 2026 Sistema Clínico - Gestão Eficiente</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>

</html>
