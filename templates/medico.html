<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bem-Estar - Médicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏥 Clínica Bem-Estar</a>
        </div>
    </nav>

    <header class="hero-header text-center shadow-sm">
        <div class="container">
            <h1 class="display-5 fw-bold text-primary">Gestão de Médicos</h1>
            <p class="lead text-muted">Médicos cadastrados no sistema.</p>
        </div>
    </header>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-primary">
                        <i class="bi bi-search">🔍</i>
                    </span>
                    <input type="text" id="inputBuscaMedico" class="form-control border-start-0 ps-0" 
                           placeholder="Buscar por nome ou CRM do médico...">
                    <button class="btn btn-success" type="button" onclick="abrirModalCadastroMedico()" title="Cadastrar Novo Médico">
                        <span class="fs-5 fw-bold">+</span>
                    </button>
                </div>
            </div>
    </div>

    <div class="modal fade" id="modalCadastroMedico" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Cadastrar Novo Médico</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formCadastroMedico">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome Completo:</label>
                            <input type="text" id="cadNome" class="form-control" placeholder="Ex: Dr. João Pereira" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">CRM:</label>
                            <input type="text" id="cadCRM" class="form-control" placeholder="Somente números" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Especialidade:</label>
                            <input type="text" id="cadEspecialidade" class="form-control" placeholder="Ex: Cardiologia" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="salvarNovoMedico()">Cadastrar Médico</button>
                </div>
            </div>      
        </div>
    </div>

    <main class="container">
        <div class="row g-3" id="listaMedicosCards">
        </div>
    </main>

    <div class="modal fade" id="detalhesMedicoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Detalhes do Médico</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo:</label>
                        <input type="text" id="editNome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">CRM:</label>
                        <input type="text" id="editCRM" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Especialidade:</label>
                        <input type="text" id="editEspecialidade" class="form-control">
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" id="botaoExcluirMedico" class="btn btn-danger">Excluir Médico</button>
                    <button type="button" id="botaoAtualizarMedico" class="btn btn-success">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 py-4">
        <p class="text-secondary small"> &copy; 2026 Sistema Clínico - Gestão Eficiente</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/medico.js') }}"></script>

</body>
</html>
